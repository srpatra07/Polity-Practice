<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constitution Practice Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --bg-color: #050811;
            --accent-gold: #d4af37;
            --accent-blue: #00d2ff;
            --text-light: #e2e8f0;
            --card-bg: #111827;
            --correct: #22c55e;
            --wrong: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Responsive Viewport */
        #viewport {
            position: relative;
            width: 95vmin;
            height: 95vmin;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Central Hub */
        .center-hub {
            position: relative;
            z-index: 10;
            text-align: center;
            background: radial-gradient(circle, #1e293b, #0f172a);
            padding: 2vmin;
            width: 25vmin;
            height: 25vmin;
            border-radius: 50%;
            border: 3px solid var(--accent-gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .center-hub i {
            font-size: 4vmin;
            color: var(--accent-gold);
            margin-bottom: 0.5vmin;
        }

        .center-hub h1 {
            font-size: 1.8vmin;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            line-height: 1.2;
        }

        /* Nodes */
        .country-node {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 15;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }

        .country-node:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .flag-img {
            width: 6.5vmin;
            height: 6.5vmin;
            background: #222;
            border: 2px solid var(--accent-blue);
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto;
        }

        .country-info {
            margin-top: 0.5vmin;
        }

        .country-name {
            font-size: 1.3vmin;
            font-weight: bold;
            color: white;
            display: block;
            text-shadow: 1px 1px 3px black;
        }

        .score-badge {
            font-size: 1.1vmin;
            background: var(--accent-gold);
            color: black;
            padding: 1px 5px;
            border-radius: 10px;
            font-weight: 800;
        }

        /* Connection Lines */
        .svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        line {
            stroke: rgba(212, 175, 55, 0.25);
            stroke-width: 1.5;
        }

        /* Practice Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 600px;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #334155;
            max-height: 85vh;
            overflow-y: auto;
        }

        .input-group {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 10px 15px;
            background: #0f172a;
            border: 2px solid #334155;
            color: white;
            border-radius: 6px;
            outline: none;
            transition: 0.2s;
        }

        .input-group input.correct {
            border-color: var(--correct);
        }

        .input-group input.wrong {
            border-color: var(--wrong);
        }

        .status-icon {
            width: 20px;
            font-size: 18px;
        }

        .btn-submit {
            background: var(--accent-gold);
            color: black;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 24px;
            color: #64748b;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div id="viewport">
        <svg class="svg-layer" id="line-canvas"></svg>

        <div class="center-hub">
            <i class="fas fa-landmark fa-3x"></i>
            <h1>Sources<br>of<br>Constitution</h1>
        </div>

        <div id="nodes-container"></div>
    </div>

    <!-- Practice Modal -->
    <div id="practice-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modal-title" style="color: var(--accent-gold); margin-bottom: 5px;"></h2>
            <p style="margin-bottom: 20px; color: #94a3b8; font-size: 0.9rem;">Press <b>Enter</b> to check each
                provision.</p>

            <div id="inputs-container"></div>

            <button class="btn-submit" onclick="finalizeSubmission()">Submit & Close</button>
        </div>
    </div>

    <script>
        // FILL YOUR DATA HERE
        const sourcesData = [
            {
                id: 0,
                country: "Govt of India Act 1935",
                img: "https://www.logopeople.in/wp-content/uploads/2013/01/government-of-india.jpg",
                provisions: ["Mostly influenced the Indian Constitution", "Emergency provisions", "Establishment of Supreme Court", "Public Service Commissions (PSCs)", "Office of Governor", "Federal scheme"]
            },
            {
                id: 1,
                country: "United Kingdom",
                img: "https://upload.wikimedia.org/wikipedia/en/thumb/a/ae/Flag_of_the_United_Kingdom.svg/960px-Flag_of_the_United_Kingdom.svg.png",
                provisions: ["Parliamentary form of government", "Parliamentary privileges", "Single citizenship", "Rule of Law", "Writs", "Legislative procedure", "Bicameral legislature", "Court of record"]
            },
            {
                id: 2,
                country: "USA",
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Flag_of_the_United_States_%28DDD-F-416E_specifications%29.svg/960px-Flag_of_the_United_States_%28DDD-F-416E_specifications%29.svg.png",
                provisions: ["Fundamental Rights", "Public Interest Litigation", "Preamble", "Separation of Powers", "Supremacy of Constitution", "Independence of Judiciary (Removal of SC and HC Judge)", "Judicial Review", "Equal Protection of Law", "Election of the Head of the State", "Impeachment of President", "Post of Vice-President", "Financial Emergency"]
            },
            {
                id: 3,
                country: "Canada",
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Flag_of_Canada_%28Pantone%29.svg/250px-Flag_of_Canada_%28Pantone%29.svg.png",
                provisions: ["Federation with a Strong Centre", "Centre appoints Governor of State", "Residuary powers vested in the Centre", "Advisory jurisdiction of Supreme Court"]
            },
            {
                id: 4,
                country: "Australia",
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/Flag_of_Australia_%28converted%29.svg/960px-Flag_of_Australia_%28converted%29.svg.png",
                provisions: ["Concurrent List", "Freedom of trade and commerce", "Joint sitting of two Houses", "Division of powers between Centre and State"]
            },
            {
                id: 5,
                country: "Ireland",
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Flag_of_Ireland.svg/960px-Flag_of_Ireland.svg.png",
                provisions: ["Directive Principles of State Policy", "Nomination of members to Rajya Sabha"]
            },
            {
                id: 6,
                country: "Germany",
                img: "https://upload.wikimedia.org/wikipedia/en/thumb/b/ba/Flag_of_Germany.svg/960px-Flag_of_Germany.svg.png",
                provisions: ["President's power during Emergency", "Suspension of Fundamental Rights during Emergency"]
            },
            {
                id: 7,
                country: "USSR (Russia)",
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Flag_of_the_Soviet_Union.svg/960px-Flag_of_the_Soviet_Union.svg.png",
                provisions: ["Fundamental Duties", "Ideals of Justice", "Five-Year Plans"]
            },
            {
                id: 8,
                country: "France",
                img: "https://upload.wikimedia.org/wikipedia/en/thumb/c/c3/Flag_of_France.svg/250px-Flag_of_France.svg.png",
                provisions: ["Liberty, Equality, Fraternity", "Republic system"]
            },
            {
                id: 9,
                country: "Japan",
                img: "https://upload.wikimedia.org/wikipedia/en/thumb/9/9e/Flag_of_Japan.svg/250px-Flag_of_Japan.svg.png",
                provisions: ["Procedure established by law"]
            },
            {
                id: 10,
                country: "South Africa",
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Flag_of_South_Africa.svg/250px-Flag_of_South_Africa.svg.png",
                provisions: ["Procedure for Amendment", "Election of Rajya Sabha members"]
            }
        ];


        let currentActiveCountry = null;
        let correctAnswersForSession = new Set();

        function init() {
            const container = document.getElementById('nodes-container');
            const svg = document.getElementById('line-canvas');
            const radius = 38; // Position radius in vmin

            sourcesData.forEach((item, index) => {
                const angle = (index * (360 / sourcesData.length)) * (Math.PI / 180);
                const x = 50 + radius * Math.cos(angle);
                const y = 50 + radius * Math.sin(angle);

                // Draw SVG Lines
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", "50%"); line.setAttribute("y1", "50%");
                line.setAttribute("x2", `${x}%`); line.setAttribute("y2", `${y}%`);
                svg.appendChild(line);

                // Create Node
                const node = document.createElement('div');
                node.className = 'country-node';
                node.style.left = `${x}%`;
                node.style.top = `${y}%`;
                node.innerHTML = `
                    <img src="${item.img}" class="flag-img">
                    <div class="country-info">
                        <span class="country-name">${item.country}</span>
                        <span class="score-badge" id="badge-${item.id}">0/${item.provisions.length}</span>
                    </div>
                `;
                node.onclick = () => openPractice(item.id);
                container.appendChild(node);
            });
        }

        function openPractice(id) {
            currentActiveCountry = sourcesData.find(s => s.id === id);
            const modal = document.getElementById('practice-modal');
            const container = document.getElementById('inputs-container');

            document.getElementById('modal-title').innerText = currentActiveCountry.country;
            container.innerHTML = '';
            correctAnswersForSession.clear();

            currentActiveCountry.provisions.forEach((_, i) => {
                const group = document.createElement('div');
                group.className = 'input-group';
                group.innerHTML = `
                    <input type="text" class="p-input" placeholder="Enter provision..." 
                           onkeypress="handleKeyPress(event, this)">
                    <div class="status-icon"></div>
                `;
                container.appendChild(group);
            });

            modal.style.display = 'flex';
        }

        function handleKeyPress(e, inputEl) {
            if (e.key === 'Enter') {
                const userVal = inputEl.value.toLowerCase().trim();
                const iconContainer = inputEl.nextElementSibling;

                if (userVal === "") return;

                // Logic: Check if user input is contained within any of the official provisions
                // or if any official provision contains the user keyword.
                const matchIndex = currentActiveCountry.provisions.findIndex(p => {
                    const official = p.toLowerCase();
                    return (official.includes(userVal) || userVal.includes(official)) && !correctAnswersForSession.has(official);
                });

                if (matchIndex !== -1) {
                    const matchedProvision = currentActiveCountry.provisions[matchIndex].toLowerCase();
                    inputEl.className = 'correct';
                    iconContainer.innerHTML = '✅';
                    correctAnswersForSession.add(matchedProvision);
                    inputEl.disabled = true; // Lock the correct answer
                } else {
                    inputEl.classList.add('wrong');
                    iconContainer.innerHTML = '❌';
                    setTimeout(() => {
                        inputEl.classList.remove('wrong');
                        iconContainer.innerHTML = '';
                    }, 1000);
                }
            }
        }

        function finalizeSubmission() {
            const total = currentActiveCountry.provisions.length;
            const score = correctAnswersForSession.size;

            // Update badge on main screen
            document.getElementById(`badge-${currentActiveCountry.id}`).innerText = `${score}/${total}`;

            closeModal();
        }

        function closeModal() {
            document.getElementById('practice-modal').style.display = 'none';
        }

        window.onload = init;
    </script>
</body>

</html>
