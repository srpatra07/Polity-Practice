<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOI Act 1935 | Mastery Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --bg-color: #020617;
            --accent-gold: #fbbf24;
            --accent-blue: #38bdf8;
            --text-light: #f1f5f9;
            --card-bg: #0f172a;
            --correct: #22c55e;
            --wrong: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            color: var(--text-light);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #viewport {
            position: relative;
            width: 85vmin;
            height: 85vmin;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .center-hub {
            position: relative;
            z-index: 10;
            text-align: center;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 2vmin;
            width: 26vmin;
            height: 26vmin;
            border-radius: 50%;
            border: 4px solid var(--accent-gold);
            box-shadow: 0 0 50px rgba(251, 191, 36, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .center-hub h1 {
            font-size: 2.4vmin;
            color: var(--accent-gold);
            letter-spacing: 2px;
            margin-top: 5px;
            line-height: 1.2;
        }

        .center-hub span {
            font-size: 1.1vmin;
            color: var(--accent-blue);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .node {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 15;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            width: 18vmin;
        }

        .node:hover { transform: translate(-50%, -50%) scale(1.1); }

        .node-icon {
            width: 8vmin;
            height: 8vmin;
            background: #0f172a;
            border: 2px solid var(--accent-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5vmin;
            color: var(--accent-gold);
            margin: 0 auto 10px auto;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .node-label {
            font-size: 1.4vmin;
            font-weight: 700;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 4px;
        }

        .score-badge {
            font-size: 1.1vmin;
            color: var(--accent-blue);
            background: rgba(56, 189, 248, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .svg-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        line {
            stroke: rgba(251, 191, 36, 0.15);
            stroke-width: 2;
            stroke-dasharray: 8;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.98);
            display: none; /* Controlled by JS */
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--card-bg);
            width: 90vw;
            max-width: 800px;
            height: 85vh;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            margin-bottom: 30px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 20px;
        }

        .practice-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 15px;
        }

        .row {
            background: #020617;
            margin-bottom: 12px;
            padding: 18px;
            border-radius: 12px;
            border-left: 5px solid #334155;
            transition: 0.3s;
        }

        .row.correct { 
            border-left-color: var(--correct); 
            background: rgba(34, 197, 94, 0.05); 
        }

        .row input {
            width: 100%;
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 1.1rem;
            outline: none;
        }

        .full-text {
            display: none;
            font-size: 1.1rem;
            line-height: 1.5;
            color: #fff;
            font-weight: 500;
        }

        .row.correct input { display: none; }
        .row.correct .full-text { display: block; }

        .btn-done {
            background: var(--accent-gold);
            color: black;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>

<body>

    <div id="viewport">
        <svg class="svg-layer" id="line-canvas"></svg>
        <div class="center-hub">
            <span>Constitutional Hub</span>
            <h1>GOI ACT<br>1935</h1>
            <i class="fas fa-landmark" style="margin-top: 10px; color: var(--accent-gold); opacity: 0.5;"></i>
        </div>
        <div id="nodes-container"></div>
    </div>

    <!-- Correct ID here -->
    <div id="practice-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="m-title" style="color: var(--accent-gold); font-size: 2rem;"></h2>
                <p style="color: #64748b; margin-top: 5px;">Type and press Enter. Articles, spaces, and punctuation are ignored.</p>
            </div>
            <div id="m-body" class="practice-area"></div>
            <button class="btn-done" onclick="closeModal()">Save Progress & Exit</button>
        </div>
    </div>

    <script>
        const actCategories = [
            {
                id: 1, title: "Federal Framework", icon: "fa-landmark",
                features: [
                    "Establishment of an All-India Federation",
                    "Federation consists of Provinces and Princely States as units",
                    "Divided powers into three lists: Federal, Provincial, and Concurrent",
                    "Federal List (for Centre) : 59 items",
                    "Provincial List (for Provinces) : 54 items",
                    "Concurrent List (for both) : 36 items",
                    "Residuary powers vested in Viceroy",
                    "Federation never came into being as Princely States did not join"
                ]
            },
            {
                id: 2, title: "Provincial & Central Govt", icon: "fa-sitemap",
                features: [
                    "Abolished Dyarchy in the provinces",
                    "Provincial Autonomy in place of Dyarchy",
                    "Provinces allowed to act as autonomous units of administration",
                    "Responsible government in provinces (Ministers responsible to Legislature)",
                    "Dyarchy at the Centre",
                    "Federal subjects were divided into Reserved and Transferred subjects",
                    "Viceroy = Head of the Central Executive"
                ]
            },
            {
                id: 3, title: "Legislature & Voting", icon: "fa-users-line",
                features: [
                    "Introduced Bicameralism in 6 out of 11 provinces",
                    "Bicameral provinces: Bengal, Bombay, Madras, Bihar, Assam, and United Provinces",
                    "Legislative Councils (Upper House) and Legislative Assemblies (Lower House) created",
                    "Extended the principle of communal representation (Separate Electorates)",
                    "Separate electorates for Depressed Classes (Scheduled Castes) but in General constituency",
                    "Separate electorates for Women and Labor (Workers)",
                    "Extended the franchise (voting rights) to about 10% of the total population"
                ]
            },
            {
                id: 4, title: "Institutions & Courts", icon: "fa-building-columns",
                features: [
                    "Establishment of Reserve Bank of India (RBI)",
                    "RBI created to control the currency and credit of the country",
                    "Establishment of a Federal Court (set up in 1937)",
                    "Federal Public Service Commission",
                    "Provincial Public Service Commissions",
                    "Joint Public Service Commissions for two or more provinces"
                ]
            },
            {
                id: 5, title: "Administrative Changes", icon: "fa-map-location-dot",
                features: [
                    "Abolished the Council of India (established by Act of 1858)",
                    "Secretary of State for India provided with a team of advisors",
                    "Separation of Burma from India",
                    "Created two new provinces: Sindh and Orissa",
                    "The Act was a lengthy document with 321 Sections and 10 Schedules"
                ]
            }
        ];

        let activeCat = null;
        let progressData = {};

        // Normalization function
        function cleanString(str) {
            if(!str) return "";
            return str.toLowerCase()
                .replace(/\b(a|an|the)\b/g, "") // Remove articles
                .replace(/[,\-\s\.\(\)\:\"\'\;\_]/g, "") // Remove all punctuation and spaces
                .trim();
        }

        function init() {
            const container = document.getElementById('nodes-container');
            const svg = document.getElementById('line-canvas');
            const radius = 33;

            actCategories.forEach((cat, index) => {
                const angle = (index * (360 / actCategories.length) - 90) * (Math.PI / 180);
                const x = 50 + radius * Math.cos(angle);
                const y = 50 + radius * Math.sin(angle);

                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", "50%"); line.setAttribute("y1", "50%");
                line.setAttribute("x2", `${x}%`); line.setAttribute("y2", `${y}%`);
                svg.appendChild(line);

                const node = document.createElement('div');
                node.className = 'node';
                node.style.left = `${x}%`;
                node.style.top = `${y}%`;
                node.innerHTML = `
                    <div class="node-icon"><i class="fas ${cat.icon}"></i></div>
                    <div class="node-label">${cat.title}</div>
                    <span class="score-badge" id="badge-${cat.id}">0 / ${cat.features.length}</span>
                `;
                node.onclick = () => openModal(cat.id);
                container.appendChild(node);
                progressData[cat.id] = new Set();
            });
        }

        function openModal(id) {
            activeCat = actCategories.find(c => c.id === id);
            document.getElementById('m-title').innerText = activeCat.title;
            const body = document.getElementById('m-body');
            body.innerHTML = '';

            activeCat.features.forEach((feat, index) => {
                const isCorrect = progressData[id].has(index);
                const row = document.createElement('div');
                row.className = 'row' + (isCorrect ? ' correct' : '');
                row.innerHTML = `
                    <input type="text" placeholder="Type keywords here..." onkeypress="handleInput(event, ${index})">
                    <div class="full-text"><i class="fas fa-check-circle" style="color:var(--correct); margin-right:10px"></i> ${feat}</div>
                `;
                body.appendChild(row);
            });
            
            // Fixed reference to modal
            document.getElementById('practice-modal').style.display = 'flex';
        }

        function handleInput(e, index) {
            if (e.key === 'Enter') {
                const inputClean = cleanString(e.target.value);
                if (inputClean.length < 2) return;

                const officialClean = cleanString(activeCat.features[index]);
                
                if (officialClean.includes(inputClean)) {
                    e.target.parentElement.classList.add('correct');
                    progressData[activeCat.id].add(index);
                    e.target.value = "";
                } else {
                    e.target.parentElement.style.borderColor = "var(--wrong)";
                    setTimeout(() => e.target.parentElement.style.borderColor = "#334155", 500);
                }
            }
        }

        function closeModal() {
            const unlockedCount = progressData[activeCat.id].size;
            document.getElementById(`badge-${activeCat.id}`).innerText = `${unlockedCount} / ${activeCat.features.length}`;
            document.getElementById('practice-modal').style.display = 'none';
        }

        // Close modal if clicking outside content
        window.onclick = (event) => { 
            const modal = document.getElementById('practice-modal');
            if (event.target == modal) closeModal(); 
        }

        window.onload = init;
    </script>
</body>

</html>
