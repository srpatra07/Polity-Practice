<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constituent Assembly | Card Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #020617;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --gold: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                radial-gradient(circle at bottom left, #0f172a, transparent);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- Header & Progress --- */
        .top-ui {
            position: absolute;
            top: 40px;
            text-align: center;
            width: 100%;
        }

        .progress-container {
            width: 300px;
            height: 6px;
            background: #334155;
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), #818cf8);
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .stats-hub {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 10px;
        }

        .stat-item {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dim);
        }

        .stat-item span {
            color: var(--text-main);
            font-weight: 700;
        }

        /* --- Card System --- */
        .game-container {
            position: relative;
            width: 500px;
            height: 400px;
            perspective: 1000px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            backface-visibility: hidden;
        }

        /* Card Entry/Exit Animations */
        .card.active {
            transform: scale(1) translateY(0);
            opacity: 1;
            z-index: 2;
        }

        .card.upcoming {
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            z-index: 1;
        }

        .card.exit-correct {
            transform: translateX(500px) rotate(20deg);
            opacity: 0;
        }

        .card.exit-wrong {
            transform: translateX(-500px) rotate(-20deg);
            opacity: 0;
        }

        .committee-category {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .committee-name {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 40px;
            min-height: 80px;
            display: flex;
            align-items: center;
        }

        /* --- Input Area --- */
        .input-wrapper {
            width: 100%;
            position: relative;
        }

        .input-box {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 15px 20px;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        .input-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        /* Feedback States */
        .card.correct-flash {
            border-color: var(--success);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
        }

        .card.wrong-flash {
            border-color: var(--error);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
            animation: shake 0.4s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .correct-reveal {
            margin-top: 15px;
            color: var(--success);
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            transition: 0.3s;
        }

        .correct-reveal.show {
            opacity: 1;
        }

        /* --- Summary Overlay --- */
        .overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 8px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .btn-restart {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
        }

        .btn-restart:hover {
            transform: scale(1.05);
            background: #818cf8;
        }
    </style>
</head>

<body>

    <div class="top-ui">
        <h1 style="font-size: 1rem; color: var(--text-dim);">CONSTITUENT ASSEMBLY CHALLENGE</h1>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div class="stats-hub">
            <div class="stat-item">Correct: <span id="stat-correct" style="color: var(--success)">0</span></div>
            <div class="stat-item">Wrong: <span id="stat-wrong" style="color: var(--error)">0</span></div>
            <div class="stat-item">Left: <span id="stat-left">0</span></div>
        </div>
    </div>

    <div class="game-container" id="game-container">
        <!-- One card will be injected here at a time -->
    </div>

    <div class="overlay" id="finish-screen">
        <div class="score-circle" id="final-percent">0%</div>
        <h2 id="final-msg">Incredible Knowledge!</h2>
        <p id="final-stats" style="color: var(--text-dim); margin-top: 10px;"></p>
        <button class="btn-restart" onclick="location.reload()">Start New Session</button>
    </div>

    <script>
        const data = [
            // Major Committees
            { name: "Union Powers Committee", ans: "Jawaharlal Nehru", cat: "Major" },
            { name: "Union Constitution Committee", ans: "Jawaharlal Nehru", cat: "Major" },
            { name: "States Committee (Committee for Negotiating with States)", ans: "Jawaharlal Nehru", cat: "Major" },
            { name: "Provincial Constitution Committee", ans: "Sardar Patel", cat: "Major" },
            { name: "Advisory Committee on FR, Minorities & Tribal Areas", ans: "Sardar Patel", cat: "Major" },
            { name: "Drafting Committee", ans: "Dr. BR Ambedkar", cat: "Major" },
            { name: "Rules of Procedure Committee", ans: "Dr. Rajendra Prasad", cat: "Major" },
            { name: "Steering Committee", ans: "Dr. Rajendra Prasad", cat: "Major" },

            // Minor Committees
            { name: "Finance and Staff Committee", ans: "Dr. Rajendra Prasad", cat: "Minor" },
            { name: "Credentials Committee", ans: "Alladi Krishnaswamy Ayyar", cat: "Minor" },
            { name: "House Committee", ans: "B Pattabhi Sitaramayya", cat: "Minor" },
            { name: "Order of Business Committee", ans: "Dr. KM Munshi", cat: "Minor" },
            { name: "Ad Hoc Committee on National Flag", ans: "Dr. Rajendra Prasad", cat: "Minor" },
            { name: "Committee on Functions of the Constituent Assembly", ans: "GV Mavalankar", cat: "Minor" },
            { name: "Ad-hoc Committee on the Supreme Court", ans: "S Varadachariar", cat: "Minor" },
            { name: "Committee on Chief Commissioners' Provinces", ans: "B Pattabhi Sitaramayya", cat: "Minor" },
            { name: "Expert Committee on the Financials Provisions", ans: "Nalini Ranjan Sarkar", cat: "Minor" },
            { name: "Linguistic Provinces Commission", ans: "SK Dhar", cat: "Minor" },
            { name: "Special committee to examine the draft constitution", ans: "Jawaharlal Nehru", cat: "Minor" },
            { name: "Press Gallery Committee", ans: "Usha Nath Sen", cat: "Minor" },
            { name: "Ad-hoc Committee on Citizenship", ans: "S Varadachariar", cat: "Minor" },

            // Sub-Committees
            { name: "Fundamental Rights Sub-Committee", ans: "JB Kripalani", cat: "Sub" },
            { name: "Minorities Sub-Committee", ans: "HC Mukherjee", cat: "Sub" },
            { name: "NE Frontier Tribal Areas", ans: "Gopinath Bordoloi", cat: "Sub" },
            { name: "Excluded & Partially Excluded Areas", ans: "AV Thakkar", cat: "Sub" },
            { name: "NW Frontier Tribal Areas", ans: "Khan Abdul Ghaffar Khan", cat: "Sub" }
        ];

        let shuffled = [];
        let currentIndex = 0;
        let score = { correct: 0, wrong: 0 };

        function init() {
            shuffled = data.sort(() => Math.random() - 0.5);
            document.getElementById('stat-left').innerText = shuffled.length;
            showCard();
        }

        function showCard() {
            if (currentIndex >= shuffled.length) {
                finishGame();
                return;
            }

            const item = shuffled[currentIndex];
            const container = document.getElementById('game-container');

            const card = document.createElement('div');
            card.className = 'card upcoming';
            card.innerHTML = `
                <div class="committee-category">${item.cat} Committee</div>
                <div class="committee-name">${item.name}</div>
                <div class="input-wrapper">
                    <input type="text" class="input-box" placeholder="Who was the Chairman?" id="q-input">
                    <div class="correct-reveal" id="reveal">Answer: ${item.ans}</div>
                </div>
            `;

            container.appendChild(card);

            // Trigger Entry Animation
            setTimeout(() => {
                card.classList.remove('upcoming');
                card.classList.add('active');
                const input = card.querySelector('input');
                input.focus();

                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleGuess(input, item.ans, card);
                });
            }, 50);
        }

        function handleGuess(input, correctAns, card) {
            const userVal = input.value.toLowerCase().replace(/\./g, '').trim();
            const target = correctAns.toLowerCase().replace(/\./g, '').trim();

            input.disabled = true;
            const isCorrect = (userVal.length > 2 && (target.includes(userVal) || userVal.includes(target)));

            if (isCorrect) {
                card.classList.add('correct-flash');
                score.correct++;
            } else {
                card.classList.add('wrong-flash');
                document.getElementById('reveal').classList.add('show');
                score.wrong++;
            }

            updateUI();

            // Transition out and bring next card
            setTimeout(() => {
                card.classList.remove('active');
                card.classList.add(isCorrect ? 'exit-correct' : 'exit-wrong');

                currentIndex++;
                setTimeout(() => {
                    card.remove();
                    showCard();
                }, 400);
            }, isCorrect ? 800 : 2000); // Give more time to see the answer if wrong
        }

        function updateUI() {
            document.getElementById('stat-correct').innerText = score.correct;
            document.getElementById('stat-wrong').innerText = score.wrong;
            document.getElementById('stat-left').innerText = shuffled.length - currentIndex - 1;

            const progress = ((currentIndex + 1) / shuffled.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
        }

        function finishGame() {
            const total = shuffled.length;
            const percent = Math.round((score.correct / total) * 100);

            document.getElementById('final-percent').innerText = percent + "%";
            document.getElementById('final-stats').innerText = `You mastered ${score.correct} out of ${total} committees!`;

            if (percent < 50) document.getElementById('final-msg').innerText = "Keep Studying!";
            else if (percent < 80) document.getElementById('final-msg').innerText = "Great Job!";
            else document.getElementById('final-msg').innerText = "Constitutional Expert!";

            document.getElementById('finish-screen').style.display = 'flex';
        }

        window.onload = init;
    </script>
</body>

</html>
